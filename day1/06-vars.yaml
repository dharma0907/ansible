- name: varialbes via promt
  hosts: frontend
  gather_facts: no
  vars_prompt:
    - name: "name"
      prompt: "What is your name?"
      private: no
      
    - name: "password"
      prompt: "Enter your password:"
      private: yes
  tasks:
  - name: print the message
    debug:
      msg: "Hello, my name is {{ name }} and I am learning {{ password }}"