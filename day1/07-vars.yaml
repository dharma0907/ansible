# here we are calling varibles form inventory file, host spacific variables
- name: demo on inventory file variables
  hosts: frontend
  gather_facts: yes
  tasks:
  - name: print the message
    debug:
      msg: "Hello, I am learning {{ course }} and my trainer is {{ trainer }}. The duration of the course is {{ duration }}"

  - name: print the common value
    debug:
      msg: "The common value is {{ common_value }} and the common key is {{ common_key }}"