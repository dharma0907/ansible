# want to install few packages and want to uninstall some packages
# to install packages
- name: install packages
  hosts: frontend
  gather_facts: yes
  become: yes
  tasks:
  - name: install httpd package
    package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
    - { name: httpd, state: present }
    - { name: vim, state: present }
# we need to use list and map to install or uninstall packages